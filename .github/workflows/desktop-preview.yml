name: Desktop Preview

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: desktop-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64 (NSIS)
            os: windows-latest
            bundle: nsis
            artifact-name: pica-pica-windows-x64-preview
            artifact-path: src-tauri/target/release/bundle/nsis/*.exe
            ffmpeg-archive: ffmpeg-n8.1.2-22-g94138f6973-win64-lgpl-8.1.zip
            ffmpeg-sha256: 268f45c3d6d17718bb84e3b0a7f3155d966d4b65f2fe8d059c8598a38bbe01fd
          - name: Linux x64 (AppImage)
            os: ubuntu-22.04
            bundle: appimage
            artifact-name: pica-pica-linux-x64-preview
            artifact-path: src-tauri/target/release/bundle/appimage/*.AppImage
            ffmpeg-archive: ffmpeg-n8.1.2-22-g94138f6973-linux64-lgpl-8.1.tar.xz
            ffmpeg-sha256: e514ab912281f881533804f36c1f6787b88b6fa4de4ca7ef43b61a3f87068d30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: >-
          sudo apt-get update &&
          sudo apt-get install -y
          libwebkit2gtk-4.1-dev
          libappindicator3-dev
          librsvg2-dev
          patchelf

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.9.0

      - name: Install Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Download and verify FFmpeg (Linux)
        if: runner.os == 'Linux'
        env:
          FFMPEG_ARCHIVE: ${{ matrix.ffmpeg-archive }}
          FFMPEG_SHA256: ${{ matrix.ffmpeg-sha256 }}
          FFMPEG_RELEASE: autobuild-2026-07-18-13-13
        run: |
          set -euo pipefail
          download_url="https://github.com/BtbN/FFmpeg-Builds/releases/download/${FFMPEG_RELEASE}/${FFMPEG_ARCHIVE}"
          curl --proto '=https' --tlsv1.2 --fail --location --retry 3 "$download_url" --output "$FFMPEG_ARCHIVE"
          echo "${FFMPEG_SHA256}  ${FFMPEG_ARCHIVE}" | sha256sum --check --strict
          mkdir -p ffmpeg-extract src-tauri/binaries
          tar --extract --xz --file "$FFMPEG_ARCHIVE" --directory ffmpeg-extract
          ffmpeg_root="$(find ffmpeg-extract -mindepth 1 -maxdepth 1 -type d -print -quit)"
          test -n "$ffmpeg_root"
          install -m 755 "$ffmpeg_root/bin/ffmpeg" src-tauri/binaries/ffmpeg
          install -m 755 "$ffmpeg_root/bin/ffprobe" src-tauri/binaries/ffprobe
          find "$ffmpeg_root" -maxdepth 1 -type f -exec cp '{}' src-tauri/binaries/ \;
          cp docs/ffmpeg-provenance.md src-tauri/binaries/FFMPEG-PROVENANCE.txt
          src-tauri/binaries/ffmpeg -version
          src-tauri/binaries/ffprobe -version

      - name: Download and verify FFmpeg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          FFMPEG_ARCHIVE: ${{ matrix.ffmpeg-archive }}
          FFMPEG_SHA256: ${{ matrix.ffmpeg-sha256 }}
          FFMPEG_RELEASE: autobuild-2026-07-18-13-13
        run: |
          $ErrorActionPreference = "Stop"
          $ProgressPreference = "SilentlyContinue"
          $downloadUrl = "https://github.com/BtbN/FFmpeg-Builds/releases/download/$env:FFMPEG_RELEASE/$env:FFMPEG_ARCHIVE"
          Invoke-WebRequest -Uri $downloadUrl -OutFile $env:FFMPEG_ARCHIVE
          $actualHash = (Get-FileHash -Algorithm SHA256 $env:FFMPEG_ARCHIVE).Hash.ToLowerInvariant()
          if ($actualHash -ne $env:FFMPEG_SHA256) {
            throw "FFmpeg checksum mismatch: expected $env:FFMPEG_SHA256, got $actualHash"
          }
          New-Item -ItemType Directory -Force ffmpeg-extract, src-tauri/binaries | Out-Null
          Expand-Archive -Path $env:FFMPEG_ARCHIVE -DestinationPath ffmpeg-extract
          $ffmpegRoot = Get-ChildItem ffmpeg-extract -Directory | Select-Object -First 1
          if (-not $ffmpegRoot) { throw "FFmpeg archive did not contain a root directory" }
          Copy-Item "$($ffmpegRoot.FullName)\bin\ffmpeg.exe" src-tauri/binaries/ffmpeg.exe
          Copy-Item "$($ffmpegRoot.FullName)\bin\ffprobe.exe" src-tauri/binaries/ffprobe.exe
          Get-ChildItem $ffmpegRoot.FullName -File | Copy-Item -Destination src-tauri/binaries
          Copy-Item docs/ffmpeg-provenance.md src-tauri/binaries/FFMPEG-PROVENANCE.txt
          & .\src-tauri\binaries\ffmpeg.exe -version
          & .\src-tauri\binaries\ffprobe.exe -version

      - name: Download and verify libmpv (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          MPV_ARCHIVE: mpv-dev-x86_64-20260421-git-5921fe5.7z
          MPV_SHA256: 9dcda280322cfec168d42f5afa1a58691311e6aaf81b8a0dfddfa97a6209a5fa
          MPV_RELEASE: "20260421"
        run: |
          $ErrorActionPreference = "Stop"
          $ProgressPreference = "SilentlyContinue"
          $downloadUrl = "https://github.com/shinchiro/mpv-winbuild-cmake/releases/download/$env:MPV_RELEASE/$env:MPV_ARCHIVE"
          Invoke-WebRequest -Uri $downloadUrl -OutFile $env:MPV_ARCHIVE
          $actualHash = (Get-FileHash -Algorithm SHA256 $env:MPV_ARCHIVE).Hash.ToLowerInvariant()
          if ($actualHash -ne $env:MPV_SHA256) {
            throw "libmpv checksum mismatch: expected $env:MPV_SHA256, got $actualHash"
          }
          New-Item -ItemType Directory -Force mpv-extract, src-tauri/binaries/mpv | Out-Null
          & 7z x $env:MPV_ARCHIVE "-ompv-extract" -y | Out-Null
          if ($LASTEXITCODE -ne 0) { throw "7-Zip could not extract libmpv" }
          $dll = Get-ChildItem mpv-extract -Recurse -Filter libmpv-2.dll | Select-Object -First 1
          if (-not $dll) { throw "libmpv archive did not contain libmpv-2.dll" }
          Copy-Item $dll.FullName src-tauri/binaries/mpv/libmpv-2.dll
          Copy-Item docs/libmpv-provenance.md src-tauri/binaries/mpv/LIBMPV-PROVENANCE.txt
          Copy-Item LICENSE src-tauri/binaries/mpv/PICA-PICA-GPL-3.0.txt

      - name: Build unsigned preview installer
        run: pnpm tauri build --ci --no-sign --bundles ${{ matrix.bundle }}

      - name: Upload preview installer
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error
          retention-days: 7
